<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stage 3: Two Markers | MR Hands-on</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: rgba(0, 0, 0, 0.7); color: #fff;
      font-size: 15px; line-height: 1.6; padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top));
    }
    #hud a { color: #7cf; }
    #readout {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(0, 0, 0, 0.7); color: #6f6;
      font: 16px/1.6 monospace; padding: 8px 12px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
    }
  </style>

  <script>
    /* proximity-reaction
     *
     * Every frame, measures how far the other marker is and reacts when it
     * gets close.
     *
     * About the unit. World coordinates here are NOT in metres, and not in
     * marker widths either: they are in pixels of the target image. But inside
     * a marker's own LOCAL frame, 1 unit is exactly 1 marker width -- which is
     * why a child with scale 0.5 draws half as wide as the marker. So we pull
     * the other marker's position into our local frame with worldToLocal, and
     * the number that falls out is "how many marker widths away is it".
     * Distance 1.0 therefore means the two markers are just touching, whatever
     * size you printed them at and however far away you hold the phone.
     *
     * Visibility comes from MindAR's targetFound / targetLost events. A marker
     * that has gone out of view keeps its last transform, so without this the
     * page would happily report a distance to a marker nobody can see.
     */
    AFRAME.registerComponent('proximity-reaction', {
      schema: {
        other:     { type: 'selector' },
        threshold: { type: 'number', default: 1.2 },
        nearColor: { type: 'color',  default: '#ff3355' },
        farColor:  { type: 'color',  default: '#33aaff' }
      },

      init: function () {
        this.otherWorld = new THREE.Vector3();
        this.otherLocal = new THREE.Vector3();
        this.readout = document.querySelector('#readout');

        this.visible = false;
        this.el.addEventListener('targetFound', () => { this.visible = true; });
        this.el.addEventListener('targetLost', () => { this.visible = false; });
      },

      tick: function () {
        const other = this.data.other;
        const shape = this.el.querySelector('.reactive');
        if (!other || !shape) return;

        const bothVisible = this.visible && other.components['proximity-reaction'].visible;
        if (!bothVisible) {
          this.readout.textContent = 'distance: --  (show BOTH markers at once)';
          return;
        }

        other.object3D.getWorldPosition(this.otherWorld);
        this.otherLocal.copy(this.otherWorld);
        this.el.object3D.worldToLocal(this.otherLocal);
        const distance = this.otherLocal.length();

        this.readout.textContent =
          'distance: ' + distance.toFixed(2) + ' marker widths  (reacts under ' +
          this.data.threshold + ')';

        const near = distance < this.data.threshold;
        shape.setAttribute('color', near ? this.data.nearColor : this.data.farColor);
        shape.setAttribute('scale', near ? '0.7 0.7 0.7' : '0.5 0.5 0.5');
        if (near) shape.object3D.lookAt(this.otherWorld);
      }
    });
  </script>
</head>
<body>

  <div id="hud">
    <b>Stage 3: Two Markers</b> &mdash; work in pairs. Put Marker A and Marker B
    side by side and film BOTH with one phone. Slide them together.<br />
    <a href="./index.html">Back to hub</a>
  </div>
  <div id="readout">distance: --</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 2; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-light type="ambient" intensity="1"></a-light>

    <!-- maxTrack: 2 above is what allows BOTH markers to be tracked at the
         same time. The default is 1, and with the default the second marker
         is simply ignored. -->

    <!-- Marker A -->
    <a-entity id="anchorA"
              mindar-image-target="targetIndex: 0"
              proximity-reaction="other: #anchorB; threshold: 1.2;
                                  nearColor: #ff3355; farColor: #33aaff;">
      <a-cone class="reactive" color="#33aaff"
              position="0 0 0.25" scale="0.5 0.5 0.5" rotation="90 0 0">
      </a-cone>
    </a-entity>

    <!-- Marker B -->
    <a-entity id="anchorB"
              mindar-image-target="targetIndex: 1"
              proximity-reaction="other: #anchorA; threshold: 1.2;
                                  nearColor: #ffaa00; farColor: #33ff88;">
      <a-cone class="reactive" color="#33ff88"
              position="0 0 0.25" scale="0.5 0.5 0.5" rotation="90 0 0">
      </a-cone>
    </a-entity>

    <!-- ==== TASKS ====
         1. Read the distance at the bottom of the screen while you slide the
            markers together. Then set "threshold" (BOTH of them) to the
            distance where you actually want the reaction to fire.
         2. Change nearColor / farColor.
         3. Cover Marker B with your hand while they are close together.
            What happens to the object on Marker A, and why?
    -->

  </a-scene>
</body>
</html>
