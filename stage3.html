<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stage 3: Build a Scene | MR Hands-on</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script src="./stage3.js"></script>
  <link rel="stylesheet" href="./stage3.css" />
</head>
<body>

  <div id="hud">
    <b>Stage 3: Build a Scene</b> &mdash; point your camera at Marker A<br />
    <span id="status">Looking for the marker&hellip;</span> &middot; <a href="./index.html">Back to hub</a>
  </div>

  <div id="bottom">
    <div id="controls">
      <button id="btn-imu">Enable IMU (look around without the marker)</button>
    </div>
    <div id="model-info">no model loaded yet &mdash; see Stage3-HowToBuildScene.md</div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.6" position="1 1 1"></a-light>

    <!-- The anchor is empty on purpose: it is only a sensor. -->
    <a-entity id="anchor" mindar-image-target="targetIndex: 0"></a-entity>

    <a-entity id="fused" imu-fusion="anchor: #anchor">
      <!-- marker frame -> Y-up frame: +X right, +Y up in the air, -Z away -->
      <a-entity rotation="90 0 0">
        <a-entity id="world" real-units>

          <!-- ==== YOUR SCENE ==== -->

        </a-entity>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
