<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stage 2: 3D Model | MR Hands-on</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- animation-mixer (glTF animation playback) comes from aframe-extras -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: rgba(0, 0, 0, 0.7); color: #fff;
      font-size: 15px; line-height: 1.6; padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top));
    }
    #hud a { color: #7cf; }
    #status { color: #fd6; }
  </style>
</head>
<body>

  <div id="hud">
    <b>Stage 2: 3D Model</b> &mdash; point your camera at Marker A<br />
    <span id="status">Looking for the marker&hellip;</span> &middot; <a href="./index.html">Back to hub</a>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="15000">
      <!-- Khronos sample model. It ships exactly three animation clips:
           Survey, Walk, Run. -->
      <a-asset-item
        id="foxModel"
        src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Fox/glTF-Binary/Fox.glb">
      </a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.6" position="1 1 1"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- The fox is about 79 units tall in model space, and here the marker
           width is 1, so scale 0.005 makes it roughly 0.4 marker-widths tall.
           rotation="90 0 0" turns the model's up axis (+Y) to face along the
           marker's normal (+Z), so the fox stands ON the marker rather than
           lying flat in its plane. -->
      <a-entity
        id="fox"
        gltf-model="#foxModel"
        position="0 0 0"
        rotation="90 0 0"
        scale="0.005 0.005 0.005"
        animation-mixer="clip: Run">
      </a-entity>

      <!-- ==== TASKS ====
           1. Change clip to Survey or Walk. Those three names are the only
              ones this model has: a name it does not have plays nothing.
              (Open the browser console: the clip list is printed there.)
           2. Try scale 0.01, then 0.002. What does scale mean here?
           3. Set rotation back to "0 0 0". Where does the fox go, and why?
      -->

    </a-entity>
  </a-scene>

  <script>
    const status = document.getElementById('status');
    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => { status.textContent = '✅ Tracking Marker A'; });
    target.addEventListener('targetLost', () => { status.textContent = '❌ Lost the marker'; });

    // Print the clip names, so Task 1 is not a guessing game.
    document.getElementById('fox').addEventListener('model-loaded', (e) => {
      console.log('[stage2] clips in this model:', e.detail.model.animations.map((a) => a.name));
    });
  </script>
</body>
</html>
